# Reverse proxy reproduced from the source nginx/default.conf, adapted for a
# backend-only, no-Docker setup: the API/WebSocket/health proxy rules are
# preserved; the upstream points at the locally-run backend (gunicorn/uvicorn
# on :8000) instead of the Docker service, and the static-frontend `location /`
# is repointed to the API (so /, /docs, and OpenAPI are reachable).
upstream api_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;

    # ── Compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Security headers ──
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── API proxy ──
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket proxy ──
    location /ws/ {
        proxy_pass http://api_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # ── Health check passthrough ──
    location /health {
        proxy_pass http://api_backend/health;
    }

    # ── Backend root / docs (frontend omitted; passthrough to the API) ──
    location / {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
